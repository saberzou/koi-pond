<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Koi Pond</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3D7A7E; }
    #liquid-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #fish-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      cursor: pointer;
    }

    .weather-tabs {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 3px;
    }
    .weather-tab {
      padding: 8px 18px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
      cursor: pointer;
      border-radius: 17px;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .weather-tab svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
    .weather-tab.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* Add Koi button */
    #add-koi-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.8);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #add-koi-btn:hover {
      background: rgba(0,0,0,0.4);
      color: #fff;
      transform: scale(1.08);
    }
    #add-koi-btn.panel-open {
      transform: rotate(45deg);
    }

    /* Koi selector panel */
    #koi-panel {
      position: fixed;
      bottom: 80px;
      right: 16px;
      z-index: 10;
      width: min(360px, calc(100vw - 32px));
      max-height: min(480px, calc(100vh - 120px));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 14px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    @media (max-width: 400px) {
      #koi-panel {
        grid-template-columns: repeat(2, 1fr);
        right: 8px;
        left: 8px;
        width: auto;
      }
    }
    #koi-panel.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .koi-card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 8px 8px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .koi-card:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.04);
    }
    .koi-card:active {
      transform: scale(0.97);
    }
    .koi-swatch {
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }
    .koi-name {
      font-family: -apple-system, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }
    .koi-name-en {
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.2;
    }
    .koi-desc {
      font-size: 9px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.3;
    }

    /* Scrollbar styling */
    #koi-panel::-webkit-scrollbar { width: 4px; }
    #koi-panel::-webkit-scrollbar-track { background: transparent; }
    #koi-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <canvas id="liquid-canvas"></canvas>
  <canvas id="fish-canvas"></canvas>
  <div class="weather-tabs">
    <button class="weather-tab active" data-weather="sunny"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>晴</button>
    <button class="weather-tab" data-weather="rainy"><svg viewBox="0 0 24 24"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M16 14v6M8 14v6M12 16v6"/></svg>雨</button>
  </div>

  <!-- Add Koi floating button -->
  <button id="add-koi-btn" title="添加锦鲤">+</button>

  <!-- Koi variety selector panel -->
  <div id="koi-panel"></div>

  <script>
    document.querySelector('.weather-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.weather-tab');
      if (!btn) return;
      document.querySelectorAll('.weather-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window.setWeather) window.setWeather(btn.dataset.weather);
    });
  </script>
  <script type="module">
    import { init } from './js/pond.js?v=37';
    import { KOI_VARIETIES } from './js/config.js?v=2';
    init();

    const btn = document.getElementById('add-koi-btn');
    const panel = document.getElementById('koi-panel');

    // Build koi cards
    KOI_VARIETIES.forEach(variety => {
      const card = document.createElement('div');
      card.className = 'koi-card';

      // SVG koi silhouette swatch
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 48 28');
      svg.setAttribute('class', 'koi-swatch');
      svg.setAttribute('xmlns', svgNS);

      // Body ellipse
      const bodyEllipse = document.createElementNS(svgNS, 'ellipse');
      bodyEllipse.setAttribute('cx', '22');
      bodyEllipse.setAttribute('cy', '14');
      bodyEllipse.setAttribute('rx', '14');
      bodyEllipse.setAttribute('ry', '7');
      bodyEllipse.setAttribute('fill', variety.body);

      // Tail triangle
      const tail = document.createElementNS(svgNS, 'polygon');
      tail.setAttribute('points', '8,14 2,6 2,22');
      tail.setAttribute('fill', variety.body);
      tail.setAttribute('opacity', '0.8');

      // Spot(s) on body
      const spot = document.createElementNS(svgNS, 'ellipse');
      spot.setAttribute('cx', '24');
      spot.setAttribute('cy', '12');
      spot.setAttribute('rx', '5');
      spot.setAttribute('ry', '3.5');
      spot.setAttribute('fill', variety.spots);
      spot.setAttribute('opacity', '0.8');

      // Tancho special: red circle on head
      if (variety.tancho) {
        const tanchoDot = document.createElementNS(svgNS, 'circle');
        tanchoDot.setAttribute('cx', '33');
        tanchoDot.setAttribute('cy', '13');
        tanchoDot.setAttribute('r', '3.5');
        tanchoDot.setAttribute('fill', variety.spots);
        svg.appendChild(bodyEllipse);
        svg.appendChild(tail);
        svg.appendChild(tanchoDot);
      } else {
        svg.appendChild(bodyEllipse);
        svg.appendChild(tail);
        svg.appendChild(spot);
        // Second spot for multi-color varieties
        if (variety.accent) {
          const spot2 = document.createElementNS(svgNS, 'ellipse');
          spot2.setAttribute('cx', '18');
          spot2.setAttribute('cy', '16');
          spot2.setAttribute('rx', '3.5');
          spot2.setAttribute('ry', '2.5');
          spot2.setAttribute('fill', variety.accent);
          spot2.setAttribute('opacity', '0.75');
          svg.appendChild(spot2);
        }
      }

      // Belly sheen
      const belly = document.createElementNS(svgNS, 'ellipse');
      belly.setAttribute('cx', '22');
      belly.setAttribute('cy', '16');
      belly.setAttribute('rx', '10');
      belly.setAttribute('ry', '3');
      belly.setAttribute('fill', variety.belly);
      belly.setAttribute('opacity', '0.25');
      svg.appendChild(belly);

      // Eye dot
      const eye = document.createElementNS(svgNS, 'circle');
      eye.setAttribute('cx', '34');
      eye.setAttribute('cy', '12');
      eye.setAttribute('r', '1.5');
      eye.setAttribute('fill', '#fff');
      svg.appendChild(eye);
      const pupil = document.createElementNS(svgNS, 'circle');
      pupil.setAttribute('cx', '34.5');
      pupil.setAttribute('cy', '12');
      pupil.setAttribute('r', '0.8');
      pupil.setAttribute('fill', '#111');
      svg.appendChild(pupil);

      const nameEl = document.createElement('div');
      nameEl.className = 'koi-name';
      nameEl.textContent = variety.name;

      const nameEnEl = document.createElement('div');
      nameEnEl.className = 'koi-name-en';
      nameEnEl.textContent = variety.nameEn;

      const descEl = document.createElement('div');
      descEl.className = 'koi-desc';
      descEl.textContent = variety.desc;

      card.appendChild(svg);
      card.appendChild(nameEl);
      card.appendChild(nameEnEl);
      card.appendChild(descEl);

      card.addEventListener('click', () => {
        if (window.addFish) window.addFish(variety);
        closePanel();
      });

      panel.appendChild(card);
    });

    function openPanel() {
      panel.classList.add('visible');
      btn.classList.add('panel-open');
    }

    function closePanel() {
      panel.classList.remove('visible');
      btn.classList.remove('panel-open');
    }

    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (panel.classList.contains('visible')) {
        closePanel();
      } else {
        openPanel();
      }
    });

    // Close panel when clicking outside
    document.addEventListener('click', e => {
      if (!panel.contains(e.target) && e.target !== btn) {
        closePanel();
      }
    });
  </script>
</body>
</html>
