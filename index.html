<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Koi Pond</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3D7A7E; }
    #liquid-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #fish-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      cursor: pointer;
    }

    .weather-tabs {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 3px;
    }
    .weather-tab {
      padding: 8px 20px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
      cursor: pointer;
      border-radius: 17px;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .weather-tab.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="liquid-canvas"></canvas>
  <canvas id="fish-canvas"></canvas>
  <div class="weather-tabs">
    <button class="weather-tab" data-weather="sunny">☀️ 晴</button>
    <button class="weather-tab active" data-weather="rainy">🌧️ 雨</button>
  </div>
  <script>
    document.querySelector('.weather-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.weather-tab');
      if (!btn) return;
      document.querySelectorAll('.weather-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window.setWeather) window.setWeather(btn.dataset.weather);
    });
  </script>
  <script type="module">
    import { init } from './js/pond.js?v=30';
    init();
  </script>
</body>
</html>
