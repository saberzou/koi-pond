<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Koi Pond</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3D7A7E; }
    #liquid-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #fish-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="liquid-canvas"></canvas>
  <canvas id="fish-canvas"></canvas>
  <script type="module">
    import { init } from './js/pond.js?v=17';
    init();
  </script>
</body>
</html>
