<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Koi Pond</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #7DD4E8; }
    #liquid-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #fish-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      cursor: pointer;
    }

    .weather-tabs {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 3px;
    }
    .weather-tab {
      padding: 8px 18px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
      cursor: pointer;
      border-radius: 17px;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .weather-tab svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
    .weather-tab.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="liquid-canvas"></canvas>
  <canvas id="fish-canvas"></canvas>
  <div class="weather-tabs">
    <button class="weather-tab active" data-weather="sunny"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>晴</button>
    <button class="weather-tab" data-weather="rainy"><svg viewBox="0 0 24 24"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M16 14v6M8 14v6M12 16v6"/></svg>雨</button>
  </div>
  <script>
    document.querySelector('.weather-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.weather-tab');
      if (!btn) return;
      document.querySelectorAll('.weather-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window.setWeather) window.setWeather(btn.dataset.weather);
    });
  </script>
  <script type="module">
    import { init } from './js/pond.js?v=35';
    init();
  </script>
</body>
</html>
