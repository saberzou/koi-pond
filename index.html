<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Koi Pond</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3D7A7E; }
    #liquid-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #fish-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      cursor: pointer;
    }

    .weather-tabs {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 3px;
    }
    .weather-tab {
      padding: 0 18px;
      height: 38px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
      cursor: pointer;
      border-radius: 100px;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .weather-tab svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
    .weather-tab.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* Add Koi button */
    #add-koi-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.8);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      transform: rotate(0deg) scale(1);
    }
    #add-koi-btn:hover {
      background: rgba(0,0,0,0.4);
      color: #fff;
      transform: rotate(0deg) scale(1);
    }
    #add-koi-btn.panel-open {
      transform: rotate(45deg) scale(1);
    }
    #add-koi-btn.panel-open:hover {
      transform: rotate(45deg) scale(1);
    }

    /* Koi selector panel */
    #koi-panel {
      position: fixed;
      bottom: 80px;
      right: 16px;
      z-index: 10;
      width: min(360px, calc(100vw - 32px));
      max-height: min(480px, calc(100vh - 120px));
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 12px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    @media (max-width: 400px) {
      #koi-panel {
        grid-template-columns: repeat(2, 1fr);
        right: 8px;
        left: 8px;
        width: auto;
      }
    }
    #koi-panel.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .koi-card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .koi-card:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.04);
    }
    .koi-card:active {
      transform: scale(0.97);
    }
    .koi-card.in-pond {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
    }
    .koi-card.in-pond .koi-status {
      display: block;
    }
    .koi-status {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ADE80;
      box-shadow: 0 0 4px rgba(74,222,128,0.6);
    }
    .koi-card {
      position: relative;
    }
    .koi-swatch {
      width: 72px;
      height: 40px;
      flex-shrink: 0;
    }
    .koi-name {
      font-family: -apple-system, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }
    .koi-name-en {
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.2;
    }
    .koi-desc {
      font-size: 9px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.3;
    }

    /* Scrollbar styling */
    #koi-panel::-webkit-scrollbar { width: 4px; }
    #koi-panel::-webkit-scrollbar-track { background: transparent; }
    #koi-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    /* Breathing button (left side, symmetric with add-koi) */
    #breathing-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #breathing-btn:hover {
      background: rgba(0,0,0,0.4);
      color: #fff;
    }

    /* ---- Breathing mode ---- */
    @keyframes breathe-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(180,220,255,0); }
      50%       { box-shadow: 0 0 14px 5px rgba(140,200,255,0.5); }
    }
    #breathing-btn.breathing-active {
      animation: breathe-glow 4s ease-in-out infinite;
      background: rgba(0,0,0,0.4);
      color: #fff;
    }

    /* Music button */
    #music-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #music-btn:hover {
      background: rgba(0,0,0,0.4);
      color: #fff;
    }
    #music-btn.playing {
      background: rgba(0,0,0,0.25);
      color: rgba(255,255,255,0.8);
    }
    #music-btn .bar { display: inline-block; width: 3px; background: currentColor; border-radius: 1.5px; margin: 0 1px; transition: height 0.3s ease; }
    #music-btn .bar:nth-child(1) { height: 8px; }
    #music-btn .bar:nth-child(2) { height: 14px; }
    #music-btn .bar:nth-child(3) { height: 10px; }
    #music-btn .bar:nth-child(4) { height: 16px; }
    #music-btn.paused .bar { height: 3px !important; }
    @keyframes bar-bounce {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.4); }
    }
    #music-btn.playing .bar:nth-child(1) { animation: bar-bounce 0.8s ease-in-out infinite 0s; }
    #music-btn.playing .bar:nth-child(2) { animation: bar-bounce 0.8s ease-in-out infinite 0.2s; }
    #music-btn.playing .bar:nth-child(3) { animation: bar-bounce 0.8s ease-in-out infinite 0.4s; }
    #music-btn.playing .bar:nth-child(4) { animation: bar-bounce 0.8s ease-in-out infinite 0.1s; }

    #breathing-overlay {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #breathing-label {
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 10px 22px;
      color: rgba(255,255,255,0.92);
      font-family: -apple-system, "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }
    #breathing-label.visible {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>
<body>
  <canvas id="liquid-canvas"></canvas>
  <canvas id="fish-canvas"></canvas>
  <div class="weather-tabs">
    <button class="weather-tab active" data-weather="sunny"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>晴</button>
    <button class="weather-tab" data-weather="rainy"><svg viewBox="0 0 24 24"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M16 14v6M8 14v6M12 16v6"/></svg>雨</button>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto" src="cobblestone_mornings.mp3"></audio>
  <audio id="breathing-music" loop preload="auto" src="ethereal_resonance.mp3"></audio>
  <button id="music-btn" class="paused" title="音乐"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>

  <!-- Breathing button (left side, symmetric with add-koi on right) -->
  <button id="breathing-btn" title="呼吸模式"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg></button>

  <!-- Breathing phase label overlay -->
  <div id="breathing-overlay">
    <div id="breathing-label"></div>
  </div>

  <!-- Add Koi floating button -->
  <button id="add-koi-btn" title="添加锦鲤">+</button>

  <!-- Koi variety selector panel -->
  <div id="koi-panel"></div>

  <script>
    // Weather tabs
    document.querySelector('.weather-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.weather-tab');
      if (!btn) return;
      document.querySelectorAll('.weather-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window.setWeather) window.setWeather(btn.dataset.weather);
    });

    // Music system — crossfade between normal and breathing tracks
    (() => {
      const bgMusic = document.getElementById('bg-music');
      const brMusic = document.getElementById('breathing-music');
      const btn = document.getElementById('music-btn');
      const TARGET_VOL = 0.35;
      const FADE_MS = 1500;
      const FADE_STEP = 30;
      let userMuted = false;

      bgMusic.volume = TARGET_VOL;
      brMusic.volume = 0;

      function fade(audio, from, to, cb) {
        const steps = FADE_MS / FADE_STEP;
        const delta = (to - from) / steps;
        let step = 0;
        const iv = setInterval(() => {
          step++;
          audio.volume = Math.max(0, Math.min(1, from + delta * step));
          if (step >= steps) { clearInterval(iv); audio.volume = to; if (cb) cb(); }
        }, FADE_STEP);
      }

      window._crossfadeToBreathing = () => {
        if (userMuted) return;
        brMusic.play().catch(() => {});
        fade(bgMusic, bgMusic.volume, 0, () => { bgMusic.pause(); });
        fade(brMusic, 0, TARGET_VOL);
      };
      window._crossfadeToNormal = () => {
        if (userMuted) return;
        bgMusic.play().catch(() => {});
        fade(brMusic, brMusic.volume, 0, () => { brMusic.pause(); });
        fade(bgMusic, 0, TARGET_VOL);
      };

      const startMusic = () => {
        if (userMuted) return;
        const isBreathing = window.isBreathingActive && window.isBreathingActive();
        const active = isBreathing ? brMusic : bgMusic;
        active.play().then(() => { btn.classList.remove('paused'); btn.classList.add('playing'); }).catch(() => {});
      };
      // Try autoplay; fallback to first interaction (capture phase so stopPropagation doesn't block it)
      startMusic();
      let started = false;
      const onInteract = () => {
        if (started) return;
        started = true;
        startMusic();
        document.removeEventListener('click', onInteract, true);
        document.removeEventListener('touchstart', onInteract, true);
      };
      document.addEventListener('click', onInteract, true);
      document.addEventListener('touchstart', onInteract, true);
      // Toggle button — mute/unmute both
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!userMuted) {
          userMuted = true;
          bgMusic.pause(); brMusic.pause();
          btn.classList.remove('playing'); btn.classList.add('paused');
        } else {
          userMuted = false;
          btn.classList.remove('paused'); btn.classList.add('playing');
          startMusic();
        }
      });
    })();

    // Breathing button (standalone)
    document.getElementById('breathing-btn').addEventListener('click', () => {
      // Close koi panel if open
      const panel = document.getElementById('koi-panel');
      const koiBtn = document.getElementById('add-koi-btn');
      if (panel && panel.classList.contains('visible')) {
        panel.classList.remove('visible');
        koiBtn && koiBtn.classList.remove('panel-open');
      }
      if (window.toggleBreathing) {
        const nowBreathing = window.toggleBreathing();
        if (nowBreathing && window._crossfadeToBreathing) window._crossfadeToBreathing();
        else if (!nowBreathing && window._crossfadeToNormal) window._crossfadeToNormal();
      }
    });

    // --- Breathing phase label loop ---
    const PHASE_TEXT = {
      inhale:          '吸气...',
      exhale:          '呼气...',
    };
    let _lastPhase = null;
    const breathingLabel = document.getElementById('breathing-label');
    const breathingBtn   = document.getElementById('breathing-btn');

    function updateBreathingUI() {
      const active = window.isBreathingActive && window.isBreathingActive();
      if (breathingBtn) {
        breathingBtn.classList.toggle('active', !!active);
        breathingBtn.classList.toggle('breathing-active', !!active);
      }
      if (!active) {
        breathingLabel && breathingLabel.classList.remove('visible');
        _lastPhase = null;
        requestAnimationFrame(updateBreathingUI);
        return;
      }
      if (breathingLabel) {
        breathingLabel.classList.add('visible');
        const phase = window.__breathingPhase || 'inhale';
        if (phase !== _lastPhase) {
          // Fade out, swap text, fade in via CSS transition
          breathingLabel.classList.remove('visible');
          setTimeout(() => {
            breathingLabel.textContent = PHASE_TEXT[phase] || '';
            breathingLabel.classList.add('visible');
          }, 320);
          _lastPhase = phase;
        }
      }
      requestAnimationFrame(updateBreathingUI);
    }
    requestAnimationFrame(updateBreathingUI);
  </script>
  <script type="module">
    import { init } from './js/pond.js?v=44';
    import { KOI_VARIETIES } from './js/config.js?v=3';
    init();

    const btn = document.getElementById('add-koi-btn');
    const panel = document.getElementById('koi-panel');

    // Build koi cards
    function updateCardStates() {
      document.querySelectorAll('.koi-card').forEach(card => {
        const nameEn = card.dataset.variety;
        const inPond = window.hasFish && window.hasFish(nameEn);
        card.classList.toggle('in-pond', inPond);
      });
    }

    KOI_VARIETIES.forEach(variety => {
      const card = document.createElement('div');
      card.className = 'koi-card';
      card.dataset.variety = variety.nameEn;

      // Green status dot
      const statusDot = document.createElement('div');
      statusDot.className = 'koi-status';
      card.appendChild(statusDot);

      // Canvas koi swatch
      const canvas = document.createElement('canvas');
      canvas.className = 'koi-swatch';
      canvas.width = 144;
      canvas.height = 80;
      drawKoiSwatch(canvas, variety);

      const nameEl = document.createElement('div');
      nameEl.className = 'koi-name';
      nameEl.textContent = variety.name;

      const nameEnEl = document.createElement('div');
      nameEnEl.className = 'koi-name-en';
      nameEnEl.textContent = variety.nameEn;

      const descEl = document.createElement('div');
      descEl.className = 'koi-desc';
      descEl.textContent = variety.desc;

      card.appendChild(canvas);
      card.appendChild(nameEl);
      card.appendChild(nameEnEl);
      card.appendChild(descEl);

      card.addEventListener('click', () => {
        const inPond = window.hasFish && window.hasFish(variety.nameEn);
        if (inPond) {
          window.removeFish && window.removeFish(variety.nameEn);
        } else {
          window.addFish && window.addFish(variety);
        }
        updateCardStates();
      });

      panel.appendChild(card);
    });

    /**
     * Draw a top-down koi silhouette on a canvas with variety-accurate patterns.
     * Canvas is 144×80, koi points right (head at right).
     */
    function drawKoiSwatch(canvas, variety) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;

      // Koi body path (top-down oval, head right, tail left)
      // Body: main ellipse + pectoral fins + tail fork
      function bodyPath() {
        ctx.beginPath();
        // Main body ellipse
        ctx.ellipse(cx + 8, cy, 48, 20, 0, 0, Math.PI * 2);
      }

      // Clip everything to body shape
      function clipToBody(fn) {
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(cx + 8, cy, 48, 20, 0, 0, Math.PI * 2);
        ctx.clip();
        fn();
        ctx.restore();
      }

      // --- Background (clear) ---
      ctx.clearRect(0, 0, W, H);

      // --- Tail fork ---
      ctx.save();
      ctx.beginPath();
      const tx = cx - 40;
      ctx.moveTo(tx, cy);
      ctx.bezierCurveTo(tx - 14, cy - 6, tx - 22, cy - 22, tx - 28, cy - 26);
      ctx.bezierCurveTo(tx - 18, cy - 8, tx - 16, cy - 2, tx - 10, cy);
      ctx.bezierCurveTo(tx - 16, cy + 2, tx - 18, cy + 8, tx - 28, cy + 26);
      ctx.bezierCurveTo(tx - 22, cy + 22, tx - 14, cy + 6, tx, cy);
      ctx.closePath();
      ctx.fillStyle = variety.body;
      ctx.globalAlpha = 0.85;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();

      // --- Pectoral fins (small side fins) ---
      ctx.save();
      ctx.globalAlpha = 0.6;
      for (const s of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(cx + 14, cy + s * 20);
        ctx.bezierCurveTo(cx + 4, cy + s * 30, cx - 4, cy + s * 32, cx - 14, cy + s * 22);
        ctx.bezierCurveTo(cx - 6, cy + s * 18, cx + 6, cy + s * 16, cx + 14, cy + s * 20);
        ctx.fillStyle = variety.body;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

      // --- Body base ---
      ctx.save();
      bodyPath();
      ctx.fillStyle = variety.body;
      ctx.fill();
      ctx.restore();

      // --- Pattern layer (clipped to body) ---
      const en = variety.nameEn;

      clipToBody(() => {
        // TANCHO: all white, single red circle near head
        if (variety.tancho) {
          ctx.fillStyle = variety.spots;
          ctx.beginPath();
          ctx.arc(cx + 38, cy, 9, 0, Math.PI * 2);
          ctx.fill();
        }
        // KOHAKU: white body, red patches on top half
        else if (en === 'Kohaku') {
          ctx.fillStyle = variety.spots;
          // Large front-shoulder patch
          ctx.beginPath();
          ctx.ellipse(cx + 22, cy - 2, 18, 10, -0.3, 0, Math.PI * 2);
          ctx.fill();
          // Mid patch
          ctx.beginPath();
          ctx.ellipse(cx - 4, cy + 3, 12, 8, 0.2, 0, Math.PI * 2);
          ctx.fill();
        }
        // TAISHO SANSHOKU: white + red patches + black spots (hi + sumi)
        else if (en === 'Taisho Sanshoku') {
          // Red patches
          ctx.fillStyle = variety.spots;
          ctx.beginPath();
          ctx.ellipse(cx + 20, cy - 3, 16, 9, -0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 5, cy + 2, 10, 7, 0.3, 0, Math.PI * 2);
          ctx.fill();
          // Black spots (sumi)
          ctx.fillStyle = variety.accent || '#1A1A1A';
          ctx.globalAlpha = 0.85;
          for (const [sx, sy, sr] of [[cx + 32, cy + 8, 3.5], [cx + 10, cy - 10, 3], [cx - 8, cy - 8, 2.5], [cx - 18, cy + 7, 3]]) {
            ctx.beginPath();
            ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
        // SHOWA: black body + red patches + white patches
        else if (en === 'Showa') {
          // Red hi patches
          ctx.fillStyle = variety.spots;
          ctx.beginPath();
          ctx.ellipse(cx + 18, cy - 4, 14, 9, -0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 10, cy + 3, 11, 7, 0.2, 0, Math.PI * 2);
          ctx.fill();
          // White shiroji patches
          ctx.fillStyle = variety.accent || '#F5F0E8';
          ctx.beginPath();
          ctx.ellipse(cx + 36, cy + 6, 8, 6, 0.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + 6, cy - 8, 7, 5, -0.2, 0, Math.PI * 2);
          ctx.fill();
        }
        // BEKKO varieties: base color + scattered black spots
        else if (en.includes('Bekko')) {
          ctx.fillStyle = variety.spots;
          ctx.globalAlpha = 0.9;
          for (const [sx, sy, sr] of [[cx + 28, cy - 6, 5], [cx + 12, cy + 7, 4], [cx - 2, cy - 8, 4.5], [cx - 14, cy + 5, 3.5], [cx + 20, cy + 8, 3]]) {
            ctx.beginPath();
            ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
        // UTSURI: black body + large accent color patches
        else if (en.includes('Utsuri')) {
          ctx.fillStyle = variety.spots; // accent color patches on black body
          // Large diagonal patches typical of utsuri
          ctx.beginPath();
          ctx.ellipse(cx + 28, cy, 16, 14, 0.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 8, cy - 2, 13, 11, -0.3, 0, Math.PI * 2);
          ctx.fill();
          // White/accent wraps chin/nose area
          ctx.beginPath();
          ctx.ellipse(cx + 44, cy, 8, 6, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        // ASAGI: blue-grey body + scale pattern on back + red belly/flanks
        else if (en === 'Asagi') {
          // Red hi on flanks/belly
          ctx.fillStyle = variety.belly;
          ctx.beginPath();
          ctx.ellipse(cx + 8, cy + 10, 32, 10, 0.1, 0, Math.PI * 2);
          ctx.fill();
          // Scale reticulation (darker lines on blue-grey back)
          ctx.strokeStyle = 'rgba(50,80,100,0.55)';
          ctx.lineWidth = 0.7;
          for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 8; col++) {
              const ox = cx - 32 + col * 10 + (row % 2) * 5;
              const oy = cy - 9 + row * 6;
              ctx.beginPath();
              ctx.arc(ox, oy, 4, 0, Math.PI * 2);
              ctx.stroke();
            }
          }
        }
        // OGON (solid metallic): add metallic sheen stripes
        else if (en.includes('Ogon') || en.includes('Matsuba')) {
          // Lighter center highlight
          const sheen = ctx.createLinearGradient(0, cy - 20, 0, cy + 20);
          sheen.addColorStop(0, variety.belly + 'CC');
          sheen.addColorStop(0.5, variety.spots + '88');
          sheen.addColorStop(1, variety.body + '44');
          ctx.fillStyle = sheen;
          ctx.fillRect(cx - 48, cy - 20, 96, 40);
          // Scale glint dots for matsuba
          if (en.includes('Matsuba')) {
            ctx.fillStyle = 'rgba(60,60,60,0.3)';
            for (let row = 0; row < 3; row++) {
              for (let col = 0; col < 7; col++) {
                const ox = cx - 26 + col * 9 + (row % 2) * 4;
                const oy = cy - 7 + row * 7;
                ctx.beginPath();
                ctx.arc(ox, oy, 2.5, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          }
        }
        // GOSHIKI: blue-grey + red patches + dark reticulation (5 colors)
        else if (en === 'Goshiki') {
          // Red patches
          ctx.fillStyle = variety.spots;
          ctx.beginPath();
          ctx.ellipse(cx + 20, cy - 3, 13, 8, -0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 8, cy + 2, 9, 6, 0.2, 0, Math.PI * 2);
          ctx.fill();
          // Scale reticulation
          ctx.strokeStyle = 'rgba(20,30,50,0.5)';
          ctx.lineWidth = 0.6;
          for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 9; col++) {
              const ox = cx - 36 + col * 9 + (row % 2) * 4;
              const oy = cy - 12 + row * 7;
              ctx.beginPath();
              ctx.arc(ox, oy, 3.5, 0, Math.PI * 2);
              ctx.stroke();
            }
          }
        }
        // KUMONRYU: black + white large flowing patches
        else if (en === 'Kumonryu') {
          ctx.fillStyle = variety.spots;
          // Flowing dragon-like white patches
          ctx.beginPath();
          ctx.moveTo(cx + 48, cy - 8);
          ctx.bezierCurveTo(cx + 34, cy - 18, cx + 14, cy - 14, cx + 6, cy - 4);
          ctx.bezierCurveTo(cx + 14, cy + 2, cx + 28, cy - 2, cx + 48, cy + 6);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 16, cy + 4, 14, 9, 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
        // BENIGOI / CHAGOI / KARASHIGOI / KARASUGOI: solid + subtle sheen
        else if (['Benigoi','Chagoi','Karashigoi','Karasugoi'].some(n => en.includes(n.replace('i','')))) {
          const sheen = ctx.createRadialGradient(cx + 14, cy - 6, 2, cx + 8, cy, 38);
          sheen.addColorStop(0, variety.belly + 'BB');
          sheen.addColorStop(0.6, variety.spots + '44');
          sheen.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sheen;
          ctx.fillRect(cx - 48, cy - 22, 96, 44);
        }
        // Default fallback: two spots
        else {
          ctx.fillStyle = variety.spots;
          ctx.globalAlpha = 0.8;
          ctx.beginPath();
          ctx.ellipse(cx + 20, cy - 2, 13, 8, -0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 6, cy + 3, 9, 6, 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      });

      // --- Dorsal fin (on top, center ridge) ---
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = variety.body;
      ctx.beginPath();
      ctx.moveTo(cx + 28, cy - 20);
      ctx.bezierCurveTo(cx + 18, cy - 28, cx + 2, cy - 28, cx - 10, cy - 22);
      ctx.bezierCurveTo(cx - 4, cy - 20, cx + 12, cy - 20, cx + 28, cy - 20);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();

      // --- Body outline ---
      ctx.save();
      bodyPath();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.restore();

      // --- Eye ---
      const eyeX = cx + 50, eyeY = cy - 5;
      ctx.save();
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeX + 1, eyeY, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#111';
      ctx.fill();
      ctx.restore();
    }

    function openPanel() {
      updateCardStates();
      panel.classList.add('visible');
      btn.classList.add('panel-open');
    }

    function closePanel() {
      panel.classList.remove('visible');
      btn.classList.remove('panel-open');
    }

    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (panel.classList.contains('visible')) {
        closePanel();
      } else {
        openPanel();
      }
    });

    // Close panel when clicking outside
    document.addEventListener('click', e => {
      if (!panel.contains(e.target) && e.target !== btn) {
        closePanel();
      }
    });
  </script>
</body>
